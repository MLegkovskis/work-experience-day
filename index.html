<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alexa Marketing Playground PREP work test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #fff;
        background:
          linear-gradient(rgba(2, 8, 23, 0.7), rgba(2, 8, 23, 0.55)),
          url("images/Alexa-Echo-Transparent-Image.png") center/cover no-repeat;
      }

      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 2rem;
        box-sizing: border-box;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        -webkit-font-smoothing: antialiased;
        position: relative;
      }

      .hero .logo {
        width: min(70vw, 28rem);
        max-width: 100%;
        height: auto;
        display: block;
        padding: 0.12em 0.3em;
        border-radius: 0.25em;
        position: relative;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 6px rgba(125, 211, 252, 0.8),
          0 0 20px rgba(56, 189, 248, 0.6),
          0 0 40px rgba(14, 165, 233, 0.4);
      }

      .hero .logo::before,
      .hero .logo::after {
        content: "";
        position: absolute;
        inset: -0.35em;
        border-radius: 0.4em;
        pointer-events: none;
        opacity: 0.95;
      }

      .hero .logo::before {
        border: 2px solid rgba(186, 230, 253, 0.95);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 18px rgba(125, 211, 252, 0.7),
          0 0 28px rgba(56, 189, 248, 0.5);
        transform: scale(1.03);
      }

      .hero .logo::after {
        inset: -0.7em;
        border: 1px dashed rgba(224, 242, 254, 0.8);
        transform: rotate(2deg);
        box-shadow:
          0 0 12px rgba(224, 242, 254, 0.7),
          0 0 22px rgba(125, 211, 252, 0.5);
      }

      .arrow {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        width: 3.2rem;
        height: 3.2rem;
        border: 0.2rem solid #7dd3fc;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 1.8rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 16px rgba(125, 211, 252, 0.7),
          0 0 24px rgba(56, 189, 248, 0.5),
          inset 0 0 10px rgba(224, 242, 254, 0.7);
      }

      @media (max-height: 420px) {
        .hero .label { font-size: clamp(1.4rem, 6vw, 3.6rem); }
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <img class="logo" src="images/Amazon_Alexa_App_Logo.png" alt="Alexa logo" />
    </main>
    <div class="arrow" aria-hidden="true">↓</div>
  </body>
</html>

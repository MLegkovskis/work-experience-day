<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alexa Marketing Playground PREP work</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #fff;
      }

      /* Horizontal stripes: each stripe fills available width and grows equally */
      .stripe {
        flex: 1 1 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 2rem;
        box-sizing: border-box;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        -webkit-font-smoothing: antialiased;
      }

      /* Large, responsive text */
      .stripe .label {
        font-size: clamp(2.5rem, 10vw, 8rem);
        line-height: 1;
      }

      /* Alternating color scheme for contrast */
      .stripe:nth-child(odd) {
        background: linear-gradient(90deg,#0b3d91,#1663c7);
        color: #fff;
      }
      .stripe:nth-child(even) {
        background: linear-gradient(90deg,#ffd23f,#ff7a18);
        color: #0b2b5a;
      }

      /* Ensure very short viewports remain readable */
      @media (max-height: 420px) {
        .stripe .label { font-size: clamp(1.4rem, 6vw, 3.6rem); }
      }
    </style>
  </head>
  <body>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
    <div class="stripe"><div class="label">Alexa</div></div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alexa Marketing Playground PREP work test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #fff;
        background:
          linear-gradient(135deg, rgba(56, 189, 248, 0.25), rgba(251, 191, 36, 0.08)),
          linear-gradient(180deg, #7dd3fc 0%, #fde68a 45%, #fbbf24 100%);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.85), transparent 20%),
          radial-gradient(circle at 80% 20%, rgba(255,255,255,0.6), transparent 15%);
        pointer-events: none;
      }

      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 2rem;
        box-sizing: border-box;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        -webkit-font-smoothing: antialiased;
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 36%;
        background: linear-gradient(180deg, rgba(255,240,170,0) 0%, rgba(251, 191, 36, 0.65) 100%);
        clip-path: polygon(0 100%, 0 55%, 10% 60%, 22% 45%, 35% 63%, 50% 42%, 66% 65%, 82% 50%, 100% 58%, 100% 100%);
        pointer-events: none;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px),
          radial-gradient(circle, rgba(125,211,252,0.7) 1px, transparent 1px);
        background-size: 120px 120px, 220px 220px;
        background-position: 0 0, 40px 70px;
        opacity: 0.28;
        pointer-events: none;
      }

      .hero-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        max-width: min(80vw, 38rem);
      }

      .echo-dot-card {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.9rem 1rem;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 1rem;
        box-shadow: 0 0 20px rgba(251, 191, 36, 0.25);
        backdrop-filter: blur(8px);
      }

      .echo-dot-visual {
        position: relative;
        width: 8.5rem;
        height: 8.5rem;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(30, 64, 175, 0.35), rgba(2, 6, 23, 0.1));
        flex-shrink: 0;
      }

      .echo-dot-visual::before {
        content: "";
        position: absolute;
        inset: -0.35rem;
        border: 1px solid rgba(191, 219, 254, 0.45);
        border-radius: 50%;
        animation: floatOrbit 4s ease-in-out infinite;
      }

      .echo-dot-device {
        width: 100%;
        max-width: 6.2rem;
        height: auto;
        transform: rotate(-8deg);
        filter: drop-shadow(0 0 18px rgba(125, 211, 252, 0.7));
        animation: drift 3s ease-in-out infinite;
      }

      .echo-dot-copy h3 {
        margin: 0 0 0.35rem;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #fff7ed;
      }

      .echo-dot-copy ul {
        margin: 0;
        padding-left: 1rem;
        font-size: 0.72rem;
        line-height: 1.5;
        color: #e2e8f0;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 600;
      }

      .explosion-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        overflow: hidden;
      }

      .explosion-overlay span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10rem;
        height: 10rem;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(147, 197, 253, 0.95) 0%, rgba(59, 130, 246, 0.45) 35%, rgba(30, 64, 175, 0) 70%);
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
        animation: blueBurst 1.2s ease-out forwards;
      }

      .explosion-overlay span:nth-child(2) { animation-delay: 0.12s; }
      .explosion-overlay span:nth-child(3) { animation-delay: 0.24s; }
      .explosion-overlay span:nth-child(4) { animation-delay: 0.36s; }

      .sparkle-unicorn {
        position: fixed;
        top: 0.8rem;
        right: 0.9rem;
        z-index: 20;
        font-size: 2.1rem;
        filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.8));
        animation: unicornFloat 2.8s ease-in-out infinite;
        transform: rotate(-8deg);
      }

      .sparkle-unicorn::before,
      .sparkle-unicorn::after {
        content: '✨';
        position: absolute;
        font-size: 0.8rem;
        color: #fff7ed;
        animation: sparkleTwinkle 1.6s ease-in-out infinite;
      }

      .sparkle-unicorn::before {
        top: -0.35rem;
        left: -0.2rem;
      }

      .sparkle-unicorn::after {
        bottom: -0.3rem;
        right: -0.1rem;
        animation-delay: 0.5s;
      }

      .beach-seagull {
        position: fixed;
        right: 2.2rem;
        top: 4.8rem;
        font-size: 2.5rem;
        z-index: 18;
        animation: gullWobble 2.2s ease-in-out infinite;
      }

      .beach-seagull::after {
        content: "🍟";
        position: absolute;
        left: 1.3rem;
        top: 1rem;
        font-size: 1.1rem;
        animation: chipNibble 1.4s ease-in-out infinite;
      }

      .hero .logo {
        width: min(70vw, 28rem);
        max-width: 100%;
        height: auto;
        display: block;
        padding: 0.12em 0.3em;
        border-radius: 0.25em;
        position: relative;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 6px rgba(125, 211, 252, 0.8),
          0 0 20px rgba(56, 189, 248, 0.6),
          0 0 40px rgba(14, 165, 233, 0.4);
      }

      .hero .logo::before,
      .hero .logo::after {
        content: "";
        position: absolute;
        inset: -0.35em;
        border-radius: 0.4em;
        pointer-events: none;
        opacity: 0.95;
      }

      .hero .logo::before {
        border: 2px solid rgba(186, 230, 253, 0.95);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 18px rgba(125, 211, 252, 0.7),
          0 0 28px rgba(56, 189, 248, 0.5);
        transform: scale(1.03);
      }

      .hero .logo::after {
        inset: -0.7em;
        border: 1px dashed rgba(224, 242, 254, 0.8);
        transform: rotate(2deg);
        box-shadow:
          0 0 12px rgba(224, 242, 254, 0.7),
          0 0 22px rgba(125, 211, 252, 0.5);
      }

      .arrow {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        width: 3.2rem;
        height: 3.2rem;
        border: 0.2rem solid #7dd3fc;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 1.8rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 16px rgba(125, 211, 252, 0.7),
          0 0 24px rgba(56, 189, 248, 0.5),
          inset 0 0 10px rgba(224, 242, 254, 0.7);
      }

      .game-shell {
        position: fixed;
        top: 0.7rem;
        left: 0.7rem;
        width: min(48vw, 48vh, 32rem);
        height: min(48vw, 48vh, 32rem);
        max-width: calc(100vw - 1.4rem);
        max-height: calc(100vh - 1.4rem);
        padding: 0.45rem;
        box-sizing: border-box;
        border-radius: 1rem;
        background: rgba(3, 10, 25, 0.82);
        border: 1px solid rgba(125, 211, 252, 0.8);
        box-shadow: 0 0 16px rgba(125, 211, 252, 0.35);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        backdrop-filter: blur(8px);
      }

      .game-shell h2 {
        margin: 0;
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-align: center;
        color: #e0f2fe;
      }

      .game-shell canvas {
        flex: 1;
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 0.6rem;
        background: linear-gradient(180deg, #b8e7ff 0%, #f7fbff 100%);
      }

      .game-shell .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
      }

      .game-shell button {
        border: none;
        border-radius: 999px;
        padding: 0.32rem 0.7rem;
        font-size: 0.58rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #082f49;
        background: linear-gradient(135deg, #fef3c7, #f59e0b);
        cursor: pointer;
        box-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
      }

      .game-shell p {
        margin: 0;
        font-size: 0.5rem;
        text-align: center;
        color: #dbeafe;
      }

      @keyframes blueBurst {
        0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0.95; }
        60% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.85; }
        100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
      }

      @keyframes unicornFloat {
        0%, 100% { transform: translateY(0) rotate(-8deg); }
        50% { transform: translateY(-0.3rem) rotate(-4deg); }
      }

      @keyframes sparkleTwinkle {
        0%, 100% { opacity: 0.7; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.15); }
      }

      @keyframes gullWobble {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-0.35rem) rotate(4deg); }
      }

      @keyframes chipNibble {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-12deg); }
      }

      @keyframes floatOrbit {
        0%, 100% { transform: scale(0.95); opacity: 0.7; }
        50% { transform: scale(1.05); opacity: 1; }
      }

      @keyframes drift {
        0%, 100% { transform: translateY(0) rotate(-8deg); }
        50% { transform: translateY(-0.25rem) rotate(-5deg); }
      }

      @media (max-height: 420px) {
        .hero .logo { font-size: clamp(1.4rem, 6vw, 3.6rem); }
      }
    </style>
  </head>
  <body>
    <div class="explosion-overlay" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="sparkle-unicorn" aria-hidden="true">🦄</div>
    <div class="beach-seagull" aria-hidden="true">🕊️</div>

    <section class="game-shell" aria-label="Parcel delivery mini game">
      <h2>Parcel Run</h2>
      <canvas id="deliveryGame" width="320" height="320"></canvas>
      <div class="controls">
        <button id="deliveryBtn" type="button">🚚 Send sparkle delivery</button>
      </div>
      <p>Click the button for a speedy joyride to the door, or steer with the arrow keys.</p>
    </section>

    <main class="hero">
      <div class="hero-content">
        <div class="echo-dot-card">
          <div class="echo-dot-visual">
            <img class="echo-dot-device" src="images/Alexa-Echo-Transparent-Image.png" alt="Alexa Echo Dot floating in space" />
          </div>
          <div class="echo-dot-copy">
            <h3>Alexa Echo Dot</h3>
            <ul>
              <li>Hands-free help for music, weather, and reminders</li>
              <li>Control lights and smart home devices with your voice</li>
              <li>Compact and ready to brighten any room</li>
            </ul>
          </div>
        </div>
        <img class="logo" src="images/Amazon_Alexa_App_Logo.png" alt="Alexa logo" />
      </div>
    </main>
    <div class="arrow" aria-hidden="true">↓</div>

    <script>
      const canvas = document.getElementById('deliveryGame');
      const ctx = canvas.getContext('2d');
      const size = 320;
      const parcel = { x: 24, y: 258, w: 20, h: 20, speed: 4 };
      const door = { x: 250, y: 34, w: 36, h: 44 };
      const obstacles = [
        { x: 112, y: 118, w: 36, h: 92 },
        { x: 178, y: 182, w: 64, h: 24 },
        { x: 62, y: 76, w: 30, h: 30 }
      ];
      const deliveryPerson = { x: 24, y: 258, w: 14, h: 20, step: 0, carrying: true };
      const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
      const deliveryButton = document.getElementById('deliveryBtn');
      let status = 'Tap the button for a sparkle delivery!';
      let autoDelivering = false;
      let celebration = 0;

      function resetParcel() {
        parcel.x = 24;
        parcel.y = 258;
        deliveryPerson.x = 24;
        deliveryPerson.y = 258;
        deliveryPerson.carrying = true;
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function startAutoDelivery() {
        resetParcel();
        autoDelivering = true;
        celebration = 0;
        status = 'Amazon driver is on the way!';
      }

      function drawParcel(x, y) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = '#a16207';
        ctx.fillRect(0, 0, parcel.w, parcel.h);
        ctx.fillStyle = '#f59e0b';
        ctx.fillRect(2, 2, parcel.w - 4, parcel.h - 4);
        ctx.strokeStyle = '#7c2d12';
        ctx.lineWidth = 1.4;
        ctx.strokeRect(1, 1, parcel.w - 2, parcel.h - 2);
        ctx.fillStyle = '#fff7ed';
        ctx.fillRect(4, 5, parcel.w - 8, 5);
        ctx.fillStyle = '#0f172a';
        ctx.font = '7px Arial';
        ctx.fillText('AMZN', 4, 13);
        ctx.restore();
      }

      function drawDoor() {
        ctx.save();
        ctx.fillStyle = '#7c2d12';
        ctx.fillRect(door.x, door.y, door.w, door.h);
        ctx.fillStyle = '#f8d7a3';
        ctx.fillRect(door.x + 6, door.y + 6, door.w - 12, door.h - 12);
        ctx.fillStyle = '#3b2f2f';
        ctx.fillRect(door.x + 12, door.y + 16, 12, 18);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(door.x + 13, door.y + 17, 10, 6);
        ctx.fillStyle = '#d97706';
        ctx.fillRect(door.x + 8, door.y + 4, 20, 6);
        ctx.fillStyle = '#16a34a';
        ctx.fillRect(door.x + 4, door.y + 38, 28, 8);
        ctx.fillStyle = '#dc2626';
        ctx.fillRect(door.x + 7, door.y + 24, 8, 8);
        ctx.restore();
      }

      function drawDeliveryPerson() {
        const bob = Math.sin(deliveryPerson.step * 0.35) * 1.5;
        const bodyY = deliveryPerson.y + bob;
        ctx.save();
        ctx.translate(deliveryPerson.x, bodyY);

        ctx.fillStyle = '#1d4ed8';
        ctx.fillRect(0, 0, 14, 6);
        ctx.fillRect(0, 8, 10, 8);
        ctx.fillStyle = '#fde68a';
        ctx.beginPath();
        ctx.arc(7, 3, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(4, 6, 6, 8);
        ctx.fillStyle = '#111827';
        ctx.fillRect(2, 10, 3, 5);
        ctx.fillRect(9, 10, 3, 5);
        ctx.fillRect(1, 14, 4, 6);
        ctx.fillRect(9, 14, 4, 6);
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(8, 6, 4, 2);
        ctx.fillStyle = '#f59e0b';
        ctx.fillRect(2, 6, 4, 2);
        ctx.fillStyle = '#ffffff';
        ctx.font = '5px Arial';
        ctx.fillText('AMZ', 3, 10);
        ctx.restore();
      }

      function update() {
        if (autoDelivering) {
          const targetX = door.x + door.w / 2 - parcel.w / 2;
          const targetY = door.y + door.h / 2 - parcel.h / 2;
          const dx = targetX - deliveryPerson.x;
          const dy = targetY - deliveryPerson.y;
          const step = 6;
          deliveryPerson.step += 1;

          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            deliveryPerson.x += Math.sign(dx) * Math.min(step, Math.abs(dx));
            deliveryPerson.y += Math.sign(dy) * Math.min(step, Math.abs(dy));
            parcel.x = deliveryPerson.x + 2;
            parcel.y = deliveryPerson.y - 2;
          } else {
            autoDelivering = false;
            celebration = 45;
            status = 'Delivered! The door says hooray!';
            resetParcel();
          }
          return;
        }

        const prevX = parcel.x;
        const prevY = parcel.y;

        if (keys.ArrowUp) parcel.y -= parcel.speed;
        if (keys.ArrowDown) parcel.y += parcel.speed;
        if (keys.ArrowLeft) parcel.x -= parcel.speed;
        if (keys.ArrowRight) parcel.x += parcel.speed;

        parcel.x = Math.max(0, Math.min(size - parcel.w, parcel.x));
        parcel.y = Math.max(0, Math.min(size - parcel.h, parcel.y));

        for (const obstacle of obstacles) {
          if (rectsOverlap(parcel, obstacle)) {
            parcel.x = prevX;
            parcel.y = prevY;
            status = 'Oops! Avoid the boxes.';
            break;
          }
        }

        if (rectsOverlap(parcel, door)) {
          celebration = 45;
          status = 'Delivered! Nice work.';
          resetParcel();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, size, size);

        ctx.fillStyle = '#d9f7ff';
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = '#9dd7ff';
        ctx.fillRect(0, size - 26, size, 26);

        for (const obstacle of obstacles) {
          ctx.fillStyle = '#ff8c42';
          ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
        }

        drawDoor();

        if (!autoDelivering) {
          drawDeliveryPerson();
        } else {
          drawDeliveryPerson();
        }

        drawParcel(parcel.x, parcel.y);

        if (celebration > 0) {
          for (let i = 0; i < 10; i += 1) {
            const angle = (i / 10) * Math.PI * 2;
            const radius = 12 + (i % 3) * 6;
            const sparkleX = door.x + door.w / 2 + Math.cos(angle) * radius;
            const sparkleY = door.y + door.h / 2 + Math.sin(angle) * radius;
            ctx.fillStyle = i % 2 === 0 ? '#fff7ed' : '#38bdf8';
            ctx.beginPath();
            ctx.arc(sparkleX, sparkleY, 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
          celebration -= 1;
        }

        ctx.fillStyle = '#123';
        ctx.font = '14px Arial';
        ctx.fillText(status, 10, 20);
      }

      function tick() {
        update();
        draw();
        requestAnimationFrame(tick);
      }

      deliveryButton.addEventListener('click', startAutoDelivery);

      window.addEventListener('keydown', (event) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
          event.preventDefault();
          keys[event.key] = true;
        }
      });

      window.addEventListener('keyup', (event) => {
        if (event.key in keys) {
          keys[event.key] = false;
        }
      });

      resetParcel();
      tick();
    </script>
  </body>
</html>

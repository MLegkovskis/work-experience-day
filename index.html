<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alexa Marketing Playground PREP work test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #fff;
        background:
          linear-gradient(rgba(2, 8, 23, 0.7), rgba(2, 8, 23, 0.55)),
          url("images/Alexa-Echo-Transparent-Image.png") center/cover no-repeat;
      }

      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 2rem;
        box-sizing: border-box;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        -webkit-font-smoothing: antialiased;
        position: relative;
      }

      .hero .logo {
        width: min(70vw, 28rem);
        max-width: 100%;
        height: auto;
        display: block;
        padding: 0.12em 0.3em;
        border-radius: 0.25em;
        position: relative;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 6px rgba(125, 211, 252, 0.8),
          0 0 20px rgba(56, 189, 248, 0.6),
          0 0 40px rgba(14, 165, 233, 0.4);
      }

      .hero .logo::before,
      .hero .logo::after {
        content: "";
        position: absolute;
        inset: -0.35em;
        border-radius: 0.4em;
        pointer-events: none;
        opacity: 0.95;
      }

      .hero .logo::before {
        border: 2px solid rgba(186, 230, 253, 0.95);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 18px rgba(125, 211, 252, 0.7),
          0 0 28px rgba(56, 189, 248, 0.5);
        transform: scale(1.03);
      }

      .hero .logo::after {
        inset: -0.7em;
        border: 1px dashed rgba(224, 242, 254, 0.8);
        transform: rotate(2deg);
        box-shadow:
          0 0 12px rgba(224, 242, 254, 0.7),
          0 0 22px rgba(125, 211, 252, 0.5);
      }

      .arrow {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        width: 3.2rem;
        height: 3.2rem;
        border: 0.2rem solid #7dd3fc;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 1.8rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 16px rgba(125, 211, 252, 0.7),
          0 0 24px rgba(56, 189, 248, 0.5),
          inset 0 0 10px rgba(224, 242, 254, 0.7);
      }

      .game-shell {
        position: fixed;
        top: 0.7rem;
        left: 0.7rem;
        width: 6cm;
        height: 6cm;
        max-width: min(38vw, 8rem);
        max-height: min(38vw, 8rem);
        padding: 0.35rem;
        box-sizing: border-box;
        border-radius: 0.7rem;
        background: rgba(3, 10, 25, 0.72);
        border: 1px solid rgba(125, 211, 252, 0.7);
        box-shadow: 0 0 10px rgba(125, 211, 252, 0.35);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }

      .game-shell h2 {
        margin: 0;
        font-size: 0.55rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: center;
        color: #e0f2fe;
      }

      .game-shell canvas {
        flex: 1;
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 0.45rem;
        background: linear-gradient(180deg, #b8e7ff 0%, #f7fbff 100%);
      }

      .game-shell p {
        margin: 0;
        font-size: 0.45rem;
        text-align: center;
        color: #dbeafe;
      }

      @media (max-height: 420px) {
        .hero .logo { font-size: clamp(1.4rem, 6vw, 3.6rem); }
      }
    </style>
  </head>
  <body>
    <section class="game-shell" aria-label="Parcel delivery mini game">
      <h2>Parcel Run</h2>
      <canvas id="deliveryGame" width="220" height="220"></canvas>
      <p>Use arrow keys to reach the door.</p>
    </section>

    <main class="hero">
      <img class="logo" src="images/Amazon_Alexa_App_Logo.png" alt="Alexa logo" />
    </main>
    <div class="arrow" aria-hidden="true">↓</div>

    <script>
      const canvas = document.getElementById('deliveryGame');
      const ctx = canvas.getContext('2d');
      const size = 220;
      const parcel = { x: 18, y: 180, w: 16, h: 16, speed: 2 };
      const door = { x: 178, y: 24, w: 24, h: 30 };
      const obstacles = [
        { x: 76, y: 70, w: 30, h: 70 },
        { x: 122, y: 124, w: 52, h: 18 },
        { x: 42, y: 44, w: 24, h: 24 }
      ];
      const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
      let status = 'Deliver the parcel to the door.';

      function resetParcel() {
        parcel.x = 18;
        parcel.y = 180;
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function update() {
        const prevX = parcel.x;
        const prevY = parcel.y;

        if (keys.ArrowUp) parcel.y -= parcel.speed;
        if (keys.ArrowDown) parcel.y += parcel.speed;
        if (keys.ArrowLeft) parcel.x -= parcel.speed;
        if (keys.ArrowRight) parcel.x += parcel.speed;

        parcel.x = Math.max(0, Math.min(size - parcel.w, parcel.x));
        parcel.y = Math.max(0, Math.min(size - parcel.h, parcel.y));

        for (const obstacle of obstacles) {
          if (rectsOverlap(parcel, obstacle)) {
            parcel.x = prevX;
            parcel.y = prevY;
            status = 'Crash! Avoid the boxes.';
            break;
          }
        }

        if (rectsOverlap(parcel, door)) {
          status = 'Delivered!';
          resetParcel();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, size, size);

        ctx.fillStyle = '#d9f7ff';
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = '#9dd7ff';
        ctx.fillRect(0, size - 18, size, 18);

        for (const obstacle of obstacles) {
          ctx.fillStyle = '#ff8c42';
          ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
        }

        ctx.fillStyle = '#1f6f2f';
        ctx.fillRect(door.x, door.y, door.w, door.h);
        ctx.fillStyle = '#7f4f24';
        ctx.fillRect(door.x + 4, door.y + 4, door.w - 8, door.h - 8);

        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(parcel.x, parcel.y, parcel.w, parcel.h);

        ctx.fillStyle = '#123';
        ctx.font = '12px Arial';
        ctx.fillText(status, 10, 16);
      }

      function tick() {
        update();
        draw();
        requestAnimationFrame(tick);
      }

      window.addEventListener('keydown', (event) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
          event.preventDefault();
          keys[event.key] = true;
        }
      });

      window.addEventListener('keyup', (event) => {
        if (event.key in keys) {
          keys[event.key] = false;
        }
      });

      resetParcel();
      tick();
    </script>
  </body>
</html>

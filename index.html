<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alexa Marketing Playground PREP work test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #fff;
        background:
          linear-gradient(rgba(2, 8, 23, 0.7), rgba(2, 8, 23, 0.55)),
          url("images/Alexa-Echo-Transparent-Image.png") center/cover no-repeat;
      }

      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 2rem;
        box-sizing: border-box;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        -webkit-font-smoothing: antialiased;
        position: relative;
      }

      .hero .logo {
        width: min(70vw, 28rem);
        max-width: 100%;
        height: auto;
        display: block;
        padding: 0.12em 0.3em;
        border-radius: 0.25em;
        position: relative;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 6px rgba(125, 211, 252, 0.8),
          0 0 20px rgba(56, 189, 248, 0.6),
          0 0 40px rgba(14, 165, 233, 0.4);
      }

      .hero .logo::before,
      .hero .logo::after {
        content: "";
        position: absolute;
        inset: -0.35em;
        border-radius: 0.4em;
        pointer-events: none;
        opacity: 0.95;
      }

      .hero .logo::before {
        border: 2px solid rgba(186, 230, 253, 0.95);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 18px rgba(125, 211, 252, 0.7),
          0 0 28px rgba(56, 189, 248, 0.5);
        transform: scale(1.03);
      }

      .hero .logo::after {
        inset: -0.7em;
        border: 1px dashed rgba(224, 242, 254, 0.8);
        transform: rotate(2deg);
        box-shadow:
          0 0 12px rgba(224, 242, 254, 0.7),
          0 0 22px rgba(125, 211, 252, 0.5);
      }

      .arrow {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        width: 3.2rem;
        height: 3.2rem;
        border: 0.2rem solid #7dd3fc;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 1.8rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 8px rgba(186, 230, 253, 0.9),
          0 0 16px rgba(125, 211, 252, 0.7),
          0 0 24px rgba(56, 189, 248, 0.5),
          inset 0 0 10px rgba(224, 242, 254, 0.7);
      }

      .game-shell {
        position: fixed;
        top: 0.7rem;
        left: 0.7rem;
        width: min(48vw, 48vh, 32rem);
        height: min(48vw, 48vh, 32rem);
        max-width: calc(100vw - 1.4rem);
        max-height: calc(100vh - 1.4rem);
        padding: 0.45rem;
        box-sizing: border-box;
        border-radius: 1rem;
        background: rgba(3, 10, 25, 0.82);
        border: 1px solid rgba(125, 211, 252, 0.8);
        box-shadow: 0 0 16px rgba(125, 211, 252, 0.35);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        backdrop-filter: blur(8px);
      }

      .game-shell h2 {
        margin: 0;
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-align: center;
        color: #e0f2fe;
      }

      .game-shell canvas {
        flex: 1;
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 0.6rem;
        background: linear-gradient(180deg, #b8e7ff 0%, #f7fbff 100%);
      }

      .game-shell .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
      }

      .game-shell button {
        border: none;
        border-radius: 999px;
        padding: 0.32rem 0.7rem;
        font-size: 0.58rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #082f49;
        background: linear-gradient(135deg, #fef3c7, #f59e0b);
        cursor: pointer;
        box-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
      }

      .game-shell p {
        margin: 0;
        font-size: 0.5rem;
        text-align: center;
        color: #dbeafe;
      }

      @media (max-height: 420px) {
        .hero .logo { font-size: clamp(1.4rem, 6vw, 3.6rem); }
      }
    </style>
  </head>
  <body>
    <section class="game-shell" aria-label="Parcel delivery mini game">
      <h2>Parcel Run</h2>
      <canvas id="deliveryGame" width="320" height="320"></canvas>
      <div class="controls">
        <button id="deliveryBtn" type="button">🚚 Send sparkle delivery</button>
      </div>
      <p>Click the button for a speedy joyride to the door, or steer with the arrow keys.</p>
    </section>

    <main class="hero">
      <img class="logo" src="images/Amazon_Alexa_App_Logo.png" alt="Alexa logo" />
    </main>
    <div class="arrow" aria-hidden="true">↓</div>

    <script>
      const canvas = document.getElementById('deliveryGame');
      const ctx = canvas.getContext('2d');
      const size = 320;
      const parcel = { x: 24, y: 258, w: 20, h: 20, speed: 4 };
      const door = { x: 250, y: 34, w: 36, h: 44 };
      const obstacles = [
        { x: 112, y: 118, w: 36, h: 92 },
        { x: 178, y: 182, w: 64, h: 24 },
        { x: 62, y: 76, w: 30, h: 30 }
      ];
      const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
      const deliveryButton = document.getElementById('deliveryBtn');
      let status = 'Tap the button for a sparkle delivery!';
      let autoDelivering = false;
      let celebration = 0;

      function resetParcel() {
        parcel.x = 24;
        parcel.y = 258;
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function startAutoDelivery() {
        resetParcel();
        autoDelivering = true;
        celebration = 0;
        status = 'Sparkle route engaged! 🚚';
      }

      function update() {
        if (autoDelivering) {
          const targetX = door.x + door.w / 2 - parcel.w / 2;
          const targetY = door.y + door.h / 2 - parcel.h / 2;
          const dx = targetX - parcel.x;
          const dy = targetY - parcel.y;
          const step = 8;

          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            parcel.x += Math.sign(dx) * Math.min(step, Math.abs(dx));
            parcel.y += Math.sign(dy) * Math.min(step, Math.abs(dy));
          } else {
            autoDelivering = false;
            celebration = 45;
            status = 'Delivered! The door says hooray!';
            resetParcel();
          }
          return;
        }

        const prevX = parcel.x;
        const prevY = parcel.y;

        if (keys.ArrowUp) parcel.y -= parcel.speed;
        if (keys.ArrowDown) parcel.y += parcel.speed;
        if (keys.ArrowLeft) parcel.x -= parcel.speed;
        if (keys.ArrowRight) parcel.x += parcel.speed;

        parcel.x = Math.max(0, Math.min(size - parcel.w, parcel.x));
        parcel.y = Math.max(0, Math.min(size - parcel.h, parcel.y));

        for (const obstacle of obstacles) {
          if (rectsOverlap(parcel, obstacle)) {
            parcel.x = prevX;
            parcel.y = prevY;
            status = 'Oops! Avoid the boxes.';
            break;
          }
        }

        if (rectsOverlap(parcel, door)) {
          celebration = 45;
          status = 'Delivered! Nice work.';
          resetParcel();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, size, size);

        ctx.fillStyle = '#d9f7ff';
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = '#9dd7ff';
        ctx.fillRect(0, size - 26, size, 26);

        for (const obstacle of obstacles) {
          ctx.fillStyle = '#ff8c42';
          ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
        }

        ctx.fillStyle = '#1f6f2f';
        ctx.fillRect(door.x, door.y, door.w, door.h);
        ctx.fillStyle = '#7f4f24';
        ctx.fillRect(door.x + 6, door.y + 6, door.w - 12, door.h - 12);

        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(parcel.x, parcel.y, parcel.w, parcel.h);

        if (celebration > 0) {
          for (let i = 0; i < 10; i += 1) {
            const angle = (i / 10) * Math.PI * 2;
            const radius = 12 + (i % 3) * 6;
            const sparkleX = door.x + door.w / 2 + Math.cos(angle) * radius;
            const sparkleY = door.y + door.h / 2 + Math.sin(angle) * radius;
            ctx.fillStyle = i % 2 === 0 ? '#fff7ed' : '#f59e0b';
            ctx.beginPath();
            ctx.arc(sparkleX, sparkleY, 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
          celebration -= 1;
        }

        ctx.fillStyle = '#123';
        ctx.font = '14px Arial';
        ctx.fillText(status, 10, 20);
      }

      function tick() {
        update();
        draw();
        requestAnimationFrame(tick);
      }

      deliveryButton.addEventListener('click', startAutoDelivery);

      window.addEventListener('keydown', (event) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
          event.preventDefault();
          keys[event.key] = true;
        }
      });

      window.addEventListener('keyup', (event) => {
        if (event.key in keys) {
          keys[event.key] = false;
        }
      });

      resetParcel();
      tick();
    </script>
  </body>
</html>

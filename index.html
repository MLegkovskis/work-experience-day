<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alexa Marketing Playground PREP work test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #fff;
        background:
          linear-gradient(rgba(2, 8, 23, 0.7), rgba(2, 8, 23, 0.55)),
          url("images/Alexa-Echo-Transparent-Image.png") center/cover no-repeat;
      }

      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 2rem;
        box-sizing: border-box;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        -webkit-font-smoothing: antialiased;
        position: relative;
      }

      .hero .label {
        font-size: clamp(2.5rem, 10vw, 8rem);
        line-height: 1;
        color: #fff;
        display: inline-block;
        padding: 0.1em 0.25em;
        border-radius: 0.2em;
        -webkit-text-stroke: 2px #0f766e;
        text-shadow:
          0 0 2px #14b8a6,
          0 0 5px #2dd4bf,
          0 0 8px #5eead4,
          0 0 12px #0f766e;
      }

      .arrow {
        position: fixed;
        left: 50%;
        bottom: 1.25rem;
        transform: translateX(-50%);
        width: 3.2rem;
        height: 3.2rem;
        border: 0.2rem solid #2dd4bf;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 1.8rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 6px #2dd4bf,
          0 0 12px #14b8a6,
          inset 0 0 8px #5eead4;
      }

      @media (max-height: 420px) {
        .stripe .label { font-size: clamp(1.4rem, 6vw, 3.6rem); }
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <div class="label">Alexa</div>
    </main>
    <div class="arrow" aria-hidden="true">↓</div>
  </body>
</html>
